services:
  db:
    image: postgres:18-alpine
    command: -p ${DB_PORT}
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - sarabun_pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT}:${DB_PORT}"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME} -p ${DB_PORT}" ]
      interval: 3s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      args:
        - SERVER_PORT=${SERVER_PORT}
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
      - "${PRISMA_PORT}:${PRISMA_PORT}"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}?schema=public
      - PORT=${SERVER_PORT}
      - CLIENT_URL=*
      - ALLOWED_ORIGINS=*
    depends_on:
      db:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        - VITE_API_PORT=${SERVER_PORT}
    ports:
      - "${CLIENT_PORT}:80"
    depends_on:
      - server

volumes:
  sarabun_pgdata:

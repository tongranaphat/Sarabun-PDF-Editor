services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: report_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d report_db" ]
      interval: 3s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "4010:4010"
    environment:
      - DATABASE_URL=postgresql://postgres:dbpass@host.docker.internal:5432/Dynamic_Report_Creator_DB?schema=public
      - PORT=4010
      - CLIENT_URL=http://localhost:5173
      - ALLOWED_ORIGINS=http://localhost:5173,http://localhost:5174
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  pgdata:
